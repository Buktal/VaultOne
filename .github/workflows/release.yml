name: Release

# Build per-OS installers on tag push and attach them to a GitHub Release.
# Trigger: push a tag matching `v*` (e.g. `git tag v1.0.0 && git push origin v1.0.0`).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (arm64)
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: yarn install

      - name: Extract changelog for this release
        # Pull this tag's section out of CHANGELOG.md → GitHub Release body.
        # tauri-action copies the Release body into the updater's latest.json
        # `notes`, shown in the in-app UpdateCard (ADR-0017). shell: bash so the
        # heredoc works on the Windows runner too.
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node scripts/extract-changelog.mjs > body.md
          # Write a multi-line GITHUB_ENV value with printf so the closing
          # delimiter always sits on its own line even if body.md lacks a
          # trailing newline (extract-changelog.mjs trims its output).
          printf 'RELEASE_BODY<<CHANGELOG_EOF\n' >> "$GITHUB_ENV"
          cat body.md >> "$GITHUB_ENV"
          printf '\nCHANGELOG_EOF\n' >> "$GITHUB_ENV"

      - name: Build and publish
        # Pinned to v0.5.20 as a known-good baseline. Auto-update also requires
        # bundle.createUpdaterArtifacts: true in tauri.conf.json — without it
        # Tauri emits no signed updater artifact and the action skips latest.json
        # ("Signature not found for the updater JSON"). Re-evaluate on a bump.
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 signing key (ADR-0017): tauri-action signs each installer
          # (.sig), builds the latest.json updater manifest, and attaches both
          # to this Release. The matching public key lives in
          # tauri.conf.json (plugins.updater.pubkey); the private key + password
          # live in repo Secrets — set them before tagging (see docs).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VaultOne ${{ github.ref_name }}'
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: false
          # Emit a signed latest.json and prefer NSIS for Windows in-place
          # updates (ADR-0017).
          updaterJsonPreferNsis: true

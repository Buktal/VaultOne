<?xml version="1.0" encoding="UTF-8"?>
<!--
  VaultOne icon — design source (ADR-0012 / P1).

  Motif: ascending usage bars inside a faint vault ring on a dark rounded
  square → "用量视图收在本地金库里". Intentionally legible at 16px (tray).

  This SVG is the editable source, NOT a bundled icon. To regenerate the full
  platform set (ico / icns / Square* / 128x128 ...), rasterize to a ≥1024px PNG
  and run from the repo root:

      yarn tauri icon <path-to-1024px-png>

  (Tauri 2's `tauri icon` consumes a PNG source; convert this SVG first if your
  toolchain does not accept SVG directly.) Until then the tray + window still
  carry the bundled icon from `tauri.conf.json` `bundle.icon`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#334155" stroke-width="24"/>
  <rect x="362" y="560" width="88" height="160" rx="18" fill="url(#bar)"/>
  <rect x="468" y="440" width="88" height="280" rx="18" fill="url(#bar)"/>
  <rect x="574" y="320" width="88" height="400" rx="18" fill="url(#bar)"/>
</svg>
